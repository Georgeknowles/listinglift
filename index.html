<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListingLift — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #B8975A; --gold-light: #F5EDD8; --gold-dark: #8B6F3A;
    --dark: #1A1814; --dark-2: #2A2520; --mid: #5C554A;
    --light: #F9F5EE; --white: #FFFFFF; --border: rgba(184,151,90,0.25);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--dark); padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 32px; height: 32px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; color: var(--dark); font-weight: 700; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--white); font-weight: 400; }
  .logo-text span { color: var(--gold); }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
  .auth-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
  .auth-card h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 400; margin-bottom: 0.4rem; }
  .auth-card h1 em { color: var(--gold-dark); font-style: italic; }
  .auth-card > p { font-size: 13px; color: var(--mid); font-weight: 300; margin-bottom: 2rem; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.75rem; }
  .tab { flex: 1; padding: 0.6rem; background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--dark); border-bottom-color: var(--gold); font-weight: 500; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid); }
  input { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--dark); background: var(--light); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus { border-color: var(--gold); background: var(--white); }
  .submit-btn { width: 100%; padding: 13px; background: var(--dark); color: var(--gold); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit-btn:hover { background: var(--dark-2); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(184,151,90,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .msg.error { background: #fff0f0; border: 1px solid #ffd0d0; color: #c0392b; }
  .msg.success { background: #f0fff4; border: 1px solid #b7f5c8; color: #1a7a3a; }
</style>
</head>
<body>
<header>
  <div class="logo-mark">L</div>
  <div class="logo-text">Listing<span>Lift</span></div>
</header>
<main>
  <div class="auth-card">
    <h1>Welcome to <em>ListingLift</em></h1>
    <p>AI-powered marketing packages for real estate agents.</p>
    <div class="tabs">
      <button class="tab active" id="signinTab" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="signupTab" onclick="switchTab('signup')">Create account</button>
    </div>
    <div id="signinForm">
      <div class="field"><label>Email</label><input type="email" id="signinEmail" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="signinPassword" placeholder="••••••••" /></div>
      <button class="submit-btn" id="signinBtn" onclick="signIn()">
        <div class="spinner" id="signinSpinner"></div>
        <span id="signinBtnText">Sign in</span>
      </button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="signupPassword" placeholder="At least 8 characters" /></div>
      <button class="submit-btn" id="signupBtn" onclick="signUp()">
        <div class="spinner" id="signupSpinner"></div>
        <span id="signupBtnText">Create account</span>
      </button>
    </div>
    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>
  </div>
</main>
<script>
  const SUPABASE_URL = 'https://iwrfsebmyghukeppihzp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_u-Av4SZVuso4hrch6P71dQ_OqJk99uX';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/app.html';
  });

  function switchTab(tab) {
    document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('signinTab').classList.toggle('active', tab === 'signin');
    document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  async function signIn() {
    const email = document.getElementById('signinEmail').value;
    const password = document.getElementById('signinPassword').value;
    if (!email || !password) return showError('Please enter your email and password.');
    setLoading('signin', true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('signin', false);
    if (error) return showError(error.message);
    window.location.href = '/app.html';
  }

  async function signUp() {
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    if (!email || !password) return showError('Please enter your email and password.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    setLoading('signup', true);
    const { error } = await sb.auth.signUp({ email, password });
    setLoading('signup', false);
    if (error) return showError(error.message);
    showSuccess('Account created! Check your email to confirm, then sign in.');
  }

  function setLoading(form, on) {
    document.getElementById(form+'Btn').disabled = on;
    document.getElementById(form+'Spinner').style.display = on ? 'block' : 'none';
    document.getElementById(form+'BtnText').textContent = on
      ? (form === 'signin' ? 'Signing in...' : 'Creating account...')
      : (form === 'signin' ? 'Sign in' : 'Create account');
  }

  function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('successMsg').style.display = 'none'; }
  function showSuccess(msg) { const e = document.getElementById('successMsg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('errorMsg').style.display = 'none'; }
</script>
</body>
</html>
